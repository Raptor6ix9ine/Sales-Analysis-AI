kind = "web"
previewPath = "/"
title = "AI Sales Analysis"
version = "1.0.0"
id = "artifacts/sales-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20101

[services.development]
run = "pnpm --filter @workspace/sales-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sales-ai", "run", "build" ]
publicDir = "artifacts/sales-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20101"
BASE_PATH = "/"
